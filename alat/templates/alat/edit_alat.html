{% extends 'alat/base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-warning">
        <h4 class="mb-0">Ubah Data Alat</h4>
    </div>
    <div class="card-body">
        {% if errors %}
            <div class="alert alert-danger">
                <ul class="mb-0">{% for error in errors %}<li>{{ error }}</li>{% endfor %}</ul>
            </div>
        {% endif %}
        <form method="POST" action="">
            {% csrf_token %}
            <div class="mb-3"><label>Kode Alat</label><input type="text" name="kode_alat" class="form-control" value="{{ alat.kode_alat }}"></div>
            <div class="mb-3"><label>Nama Alat</label><input type="text" name="nama_alat" class="form-control" value="{{ alat.nama_alat }}"></div>
            <div class="mb-3"><label>Jenis Alat</label><input type="text" name="jenis_alat" class="form-control" value="{{ alat.jenis_alat }}"></div>
            <div class="mb-3"><label>Lokasi Alat</label><input type="text" name="lokasi" class="form-control" value="{{ alat.lokasi }}"></div>
            <div class="mb-3"><label>Tahun Pengadaan</label><input type="number" name="tahun_pengadaan" class="form-control" value="{{ alat.tahun_pengadaan }}"></div>
            <div class="mb-4">
                <label>Kondisi Alat</label>
                <select name="kondisi" class="form-select">
                    <option value="Baik" {% if alat.kondisi == 'Baik' %}selected{% endif %}>Baik</option>
                    <option value="Perlu Perawatan" {% if alat.kondisi == 'Perlu Perawatan' %}selected{% endif %}>Perlu Perawatan</option>
                    <option value="Rusak" {% if alat.kondisi == 'Rusak' %}selected{% endif %}>Rusak</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100">Perbarui Data</button>
            <a href="{% url 'daftar_alat' %}" class="btn btn-outline-secondary w-100 mt-2">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
